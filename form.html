<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Submission</title>
</head>

<body bgcolor="bluegrey">
  <marquee bgcolor="lightblue"></marquee>
  <h2>Registration Form 💃</h2>
  <div class="form">
    <form action="submit" method="post">
      <label for="firstname">First name:</label> <br>
      <input type="text" id="firtsname" placeholder="firstname" name="firstname" required> <br>
      <br>
      <label for="lastname">Last name:</label><br>
      <input type="text" id="lastname" placeholder="lastname" name="lastname" required> <br>
      <br>
      <label for="email">Email:</label> <br>
      <input type="text" id="email" placeholder="@gmail" name="email" required><br>
      <br>
      <label for="phone number">Phone number:</label> <br>
      <input type="tel" id="phone_number" placeholder="+234" name="phone_number" required><br>
      <br>
      <label for="password">Password:</label> <br>
      <input type="password" id="password" name="password" minlength="8" required><br> <br>

      <input type="submit" value="submit">
  </div>






  </form>
</body>

</html>
