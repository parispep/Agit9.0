<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript basics</title>
</head>

<body>
  <h2>The JavaScript Basics</h2>
  <button onclick="myPerpetual()">Change the html content.</button>
  <p id="content">My Last time going for tutorials to learn frontend</p>
  <p id="sample">I am going to ACE this course on AGIT</p>

  <script type="text/javascript">
    function myPerpetual() {
      document.getElementById("content").innerHTML = "I am now an expert in frontend";
      document.getElementById("sample").innerHTML = "I became the very best in the AGIT programme";
    }

  </script>
</body>

</html>
